# Local development stack — preserves the original hot-reload workflow.
# Run with: docker compose -f docker-compose.dev.yml up --build
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./app:/workspace/app
      - ./data:/workspace/data
      - ./.env:/workspace/.env
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend
    restart: always
